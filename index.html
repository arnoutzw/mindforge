<!DOCTYPE html>
<html lang="en" data-theme="dark" style="color-scheme: dark;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f59e0b">
<title>MindForge — Visual Engineering Intelligence</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<style>
/* ══════════════════════════════════════════════
   THEME SYSTEM — matches BSI portal apps
   ══════════════════════════════════════════════ */
:root, [data-theme="dark"] {
  --bg-body:       #09090b;
  --bg-primary:    #18181b;
  --bg-secondary:  #27272a;
  --bg-hover:      #3f3f46;
  --text-primary:  #f4f4f5;
  --text-secondary:#d4d4d8;
  --text-muted:    #71717a;
  --text-dim:      #52525b;
  --accent:        #f59e0b;
  --accent-hover:  #fbbf24;
  --accent-bg:     rgba(245,158,11,0.10);
  --accent-bg-hover:rgba(245,158,11,0.05);
  --border:        #3f3f46;
  --border-light:  #27272a;
  --focus-ring:    #f59e0b;
  --canvas-bg:     #0a0a0c;
  --canvas-grid:   rgba(63,63,70,0.4);
  --node-shadow:   rgba(0,0,0,0.5);
  --overlay:       rgba(0,0,0,0.7);
}
[data-theme="light"] {
  --bg-body:       #eff2f4;
  --bg-primary:    #ffffff;
  --bg-secondary:  #f5f6f8;
  --bg-hover:      #e8ebef;
  --text-primary:  #081249;
  --text-secondary:#2b2a3e;
  --text-muted:    #6b6b80;
  --text-dim:      #9a9ab0;
  --accent:        #10069f;
  --accent-hover:  #1297e4;
  --accent-bg:     rgba(16,6,159,0.07);
  --accent-bg-hover:rgba(16,6,159,0.04);
  --border:        #cfd3e8;
  --border-light:  #e2e5f0;
  --focus-ring:    #1297e4;
  --canvas-bg:     #f8f9fb;
  --canvas-grid:   rgba(16,6,159,0.08);
  --node-shadow:   rgba(8,18,73,0.12);
  --overlay:       rgba(8,18,73,0.4);
}
/* Node type colors */
:root {
  --color-function:    #3b82f6;
  --color-requirement: #f59e0b;
  --color-failure:     #ef4444;
  --color-component:   #22c55e;
  --color-test:        #8b5cf6;
  --color-generic:     #71717a;
}
/* ── Light theme Tailwind overrides ── */
[data-theme="light"] .bg-zinc-950  { background-color: var(--bg-body) !important; }
[data-theme="light"] .bg-zinc-900  { background-color: var(--bg-primary) !important; }
[data-theme="light"] .bg-zinc-900\/80 { background-color: rgba(255,255,255,0.85) !important; }
[data-theme="light"] .bg-zinc-800  { background-color: var(--bg-secondary) !important; }
[data-theme="light"] .bg-zinc-700  { background-color: var(--bg-hover) !important; }
[data-theme="light"] .text-zinc-100 { color: var(--text-primary) !important; }
[data-theme="light"] .text-zinc-200 { color: var(--text-primary) !important; }
[data-theme="light"] .text-zinc-300 { color: var(--text-secondary) !important; }
[data-theme="light"] .text-zinc-400 { color: var(--text-muted) !important; }
[data-theme="light"] .text-zinc-500 { color: var(--text-muted) !important; }
[data-theme="light"] .text-zinc-600 { color: var(--text-dim) !important; }
[data-theme="light"] .text-amber-400 { color: var(--accent) !important; }
[data-theme="light"] .text-amber-500 { color: var(--accent) !important; }
[data-theme="light"] .border-zinc-700 { border-color: var(--border) !important; }
[data-theme="light"] .border-zinc-800 { border-color: var(--border-light) !important; }
[data-theme="light"] .border-amber-500 { border-color: var(--accent) !important; }
[data-theme="light"] .hover\:text-amber-400:hover { color: var(--accent-hover) !important; }
[data-theme="light"] .hover\:bg-zinc-800:hover { background-color: var(--bg-hover) !important; }
[data-theme="light"] .bg-amber-500 { background-color: var(--accent) !important; }
[data-theme="light"] .bg-amber-500\/10 { background-color: var(--accent-bg) !important; }
[data-theme="light"] .ring-amber-500 { --tw-ring-color: var(--focus-ring) !important; }

/* ── Global styles ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; overflow: hidden; }
.font-mono { font-family: 'JetBrains Mono', monospace; }
.smooth-transition { transition: all 0.2s ease; }

/* ── Canvas ── */
#canvas-container { background: var(--canvas-bg); cursor: grab; user-select: none; }
#canvas-container.panning { cursor: grabbing; }
#canvas-container.connecting { cursor: crosshair; }
.canvas-grid-dot { fill: var(--canvas-grid); }

/* ── Nodes ── */
.mind-node { cursor: pointer; }
.mind-node:hover .node-bg { filter: brightness(1.15); }
.mind-node.selected .node-bg { stroke: var(--accent); stroke-width: 2.5; }
.mind-node .connector { opacity: 0; transition: opacity 0.15s; cursor: crosshair; }
.mind-node:hover .connector { opacity: 1; }
.node-content { font-family: 'Inter', sans-serif; pointer-events: none; }
.node-title { font-weight: 600; font-size: 13px; line-height: 1.3; }
.node-meta { font-size: 10px; opacity: 0.7; margin-top: 2px; }
.node-badge { pointer-events: auto; cursor: pointer; }

/* ── Connections ── */
.connection-path { fill: none; stroke-width: 2; transition: stroke 0.15s; }
.connection-path:hover { stroke-width: 3; }
.connection-label { font-family: 'Inter', sans-serif; font-size: 10px; fill: var(--text-muted); pointer-events: none; }
[data-theme="light"] .connection-label { fill: var(--text-muted); }

/* ── Groups ── */
.group-box { rx: 10; ry: 10; }
.group-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; }

/* ── Minimap ── */
#minimap { width: 200px; height: 140px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
#minimap-svg { width: 100%; height: 100%; }
.minimap-viewport { fill: none; stroke: var(--accent); stroke-width: 1.5; opacity: 0.7; }
.minimap-node { opacity: 0.6; }

/* ── Context Menu ── */
#context-menu { z-index: 100; min-width: 180px; }
.ctx-item { display: flex; align-items: center; gap: 8px; padding: 6px 12px; cursor: pointer; font-size: 12px; font-family: 'Inter', sans-serif; color: var(--text-secondary); transition: background 0.1s; }
.ctx-item:hover { background: var(--accent-bg); color: var(--accent); }
.ctx-item.danger:hover { background: rgba(239,68,68,0.1); color: #ef4444; }
.ctx-separator { height: 1px; background: var(--border); margin: 4px 0; }
.ctx-submenu { position: relative; }
.ctx-submenu-items { display: none; position: absolute; left: 100%; top: -4px; min-width: 160px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 4px 0; box-shadow: 0 8px 24px var(--node-shadow); }
.ctx-submenu:hover .ctx-submenu-items { display: block; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: var(--overlay); display: flex; align-items: center; justify-content: center; z-index: 200; }
.modal-box { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 480px; width: 90%; max-height: 90vh; overflow-y: auto; box-shadow: 0 16px 48px var(--node-shadow); }
.modal-box h3 { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 16px; }
.modal-input { width: 100%; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text-primary); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; }
.modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); }
.modal-select { width: 100%; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text-primary); font-size: 13px; outline: none; -webkit-appearance: none; }
.modal-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-family: 'JetBrains Mono', monospace; }
.btn-primary { background: var(--accent); color: #fff; padding: 8px 20px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-ghost { background: transparent; color: var(--text-muted); padding: 8px 20px; border-radius: 6px; border: 1px solid var(--border); font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; }
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }

/* ── Toast ── */
#toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 13px; color: var(--text-secondary); box-shadow: 0 4px 16px var(--node-shadow); animation: toastIn 0.3s ease; min-width: 200px; display: flex; align-items: center; gap: 8px; }
.toast.success { border-left: 3px solid #22c55e; }
.toast.error { border-left: 3px solid #ef4444; }
.toast.info { border-left: 3px solid var(--accent); }
@keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* ── Zoom controls ── */
.zoom-slider { -webkit-appearance: none; width: 100px; height: 4px; background: var(--border); border-radius: 2px; outline: none; }
.zoom-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; }
</style>
<script>
// BSI Theme Bridge v1.1 — iframe: parent-only control / standalone: local toggle
(function() {
  var APP_THEME_KEY = 'mindforge_theme';
  var isEmbedded = (window.parent !== window);
  function applyBsiTheme(theme) {
    if (theme !== 'dark' && theme !== 'light') theme = 'dark';
    var html = document.documentElement;
    html.setAttribute('data-theme', theme);
    html.style.colorScheme = theme;
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = (theme === 'light') ? '#ffffff' : '#09090b';
    document.dispatchEvent(new CustomEvent('bsi-theme-applied', { detail: { theme: theme } }));
  }
  function mapTheme(raw) {
    return (raw === 'asml' || raw === 'light') ? 'light' : 'dark';
  }
  if (isEmbedded) {
    var s = document.createElement('style');
    s.textContent = '[data-theme-toggle]{display:none!important}';
    (document.head || document.documentElement).appendChild(s);
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'theme-change') applyBsiTheme(mapTheme(e.data.theme));
    });
    applyBsiTheme('dark');
    try { window.parent.postMessage({ type: 'theme-request' }, '*'); } catch(e) {}
  } else {
    var saved = localStorage.getItem(APP_THEME_KEY) || 'dark';
    if (saved === 'asml') { saved = 'light'; localStorage.setItem(APP_THEME_KEY, saved); }
    applyBsiTheme(saved);
    window.bsiToggleTheme = function() {
      var next = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark' ? 'light' : 'dark';
      applyBsiTheme(next);
      localStorage.setItem(APP_THEME_KEY, next);
    };
    window.bsiSetTheme = function(theme) {
      var mapped = mapTheme(theme);
      applyBsiTheme(mapped);
      localStorage.setItem(APP_THEME_KEY, mapped);
    };
  }
  window._bsiIsEmbedded = isEmbedded;
  window._bsiApplyTheme = applyBsiTheme;
})();
</script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans text-sm min-h-screen">
<!-- ══════════════════════════════════════════════
     DEMO MODE BANNER
     ══════════════════════════════════════════════ -->
<div id="demo-banner" class="hidden fixed top-0 inset-x-0 z-50 bg-blue-600/90 border-b border-blue-500 px-4 py-2 flex items-center justify-between" style="backdrop-filter:blur(8px)">
  <div class="flex items-center gap-2 text-white font-mono text-xs">
    <span>⚡</span>
    <span class="font-bold">Demo Mode</span>
    <span class="text-blue-200 ml-1">Data is stored locally in your browser</span>
  </div>
  <div class="flex gap-2">
    <button onclick="exitDemo()" class="px-3 py-1 bg-white text-blue-600 font-mono text-xs rounded hover:bg-blue-50 font-bold">Exit Demo</button>
    <button onclick="resetDemo()" class="px-3 py-1 bg-blue-500 hover:bg-blue-400 text-white font-mono text-xs rounded font-bold">Reset Data</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     SIDEBAR
     ══════════════════════════════════════════════ -->
<aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-56 bg-zinc-900 border-r border-zinc-800 flex flex-col transition-transform">
  <!-- Logo -->
  <div class="p-4 border-b border-zinc-800">
    <div class="flex items-center justify-between mb-1">
      <div class="flex gap-1.5">
        <div class="w-2.5 h-2.5 rounded-full bg-red-500"></div>
        <div class="w-2.5 h-2.5 rounded-full bg-yellow-500"></div>
        <div class="w-2.5 h-2.5 rounded-full bg-green-500"></div>
      </div>
      <button onclick="toggleSidebar()" class="text-zinc-500 hover:text-amber-400 smooth-transition"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5"/></svg></button>
    </div>
    <h1 class="font-mono font-bold text-amber-500 text-base mt-2">MindForge</h1>
    <p class="text-[10px] text-zinc-500 font-mono">Visual Engineering Intelligence</p>
  </div>
  <!-- Maps list -->
  <div class="flex-1 overflow-y-auto p-3">
    <div class="text-[10px] text-zinc-500 font-mono uppercase tracking-wider mb-2">Mind Maps</div>
    <div id="map-list"></div>
    <button onclick="showNewMapModal()" class="w-full mt-2 flex items-center gap-2 px-3 py-2 rounded-lg text-zinc-400 hover:text-amber-400 hover:bg-zinc-800 smooth-transition font-mono text-xs">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Map
    </button>
  </div>
  <!-- Footer -->
  <div class="p-3 border-t border-zinc-800 flex gap-2">
    <button onclick="exportMap()" class="flex-1 text-center text-[10px] font-mono text-zinc-500 hover:text-amber-400 smooth-transition py-1 rounded hover:bg-zinc-800" title="Export JSON">Export</button>
    <button onclick="importMap()" class="flex-1 text-center text-[10px] font-mono text-zinc-500 hover:text-amber-400 smooth-transition py-1 rounded hover:bg-zinc-800" title="Import JSON">Import</button>
  </div>
</aside>

<!-- Sidebar expand button (when collapsed) -->
<button id="sidebar-expand" class="hidden fixed top-3 left-2 z-40 text-zinc-500 hover:text-amber-400 bg-zinc-900 border border-zinc-800 rounded-lg p-1.5 smooth-transition" onclick="toggleSidebar()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 17l5-5-5-5M6 17l5-5-5-5"/></svg>
</button>

<!-- ══════════════════════════════════════════════
     MAIN CONTENT
     ══════════════════════════════════════════════ -->
<div id="main" class="ml-56 transition-all h-screen flex flex-col">
  <!-- Header -->
  <header class="sticky top-0 z-30 bg-zinc-900/80 border-b border-zinc-800 px-4 py-2 flex items-center justify-between" style="backdrop-filter:blur(8px)">
    <!-- Left: Map name -->
    <div class="flex items-center gap-3">
      <h2 id="header-map-name" class="font-mono font-bold text-zinc-100 text-sm truncate max-w-[200px]">—</h2>
    </div>
    <!-- Center: Layout + Zoom -->
    <div class="flex items-center gap-3">
      <!-- Layout buttons -->
      <div class="flex bg-zinc-800 rounded-lg p-0.5 border border-zinc-700">
        <button onclick="applyLayout('tree')" class="layout-btn px-2.5 py-1 rounded-md text-[11px] font-mono text-zinc-400 hover:text-amber-400 smooth-transition" data-layout="tree" title="Tree Layout">Tree</button>
        <button onclick="applyLayout('radial')" class="layout-btn px-2.5 py-1 rounded-md text-[11px] font-mono text-zinc-400 hover:text-amber-400 smooth-transition" data-layout="radial" title="Radial Layout">Radial</button>
        <button onclick="applyLayout('force')" class="layout-btn px-2.5 py-1 rounded-md text-[11px] font-mono text-zinc-400 hover:text-amber-400 smooth-transition" data-layout="force" title="Force-Directed">Force</button>
      </div>
      <!-- Zoom -->
      <div class="flex items-center gap-2">
        <button onclick="zoomOut()" class="text-zinc-400 hover:text-amber-400 smooth-transition"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
        <input type="range" id="zoom-slider" class="zoom-slider" min="20" max="300" value="100" oninput="setZoom(this.value/100)">
        <button onclick="zoomIn()" class="text-zinc-400 hover:text-amber-400 smooth-transition"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
        <span id="zoom-label" class="text-[10px] font-mono text-zinc-500 w-10 text-center">100%</span>
      </div>
      <!-- Fit -->
      <button onclick="fitToScreen()" class="text-zinc-400 hover:text-amber-400 smooth-transition p-1 rounded hover:bg-zinc-800" title="Fit to screen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
    </div>
    <!-- Right: Add node, theme, user -->
    <div class="flex items-center gap-2">
      <button onclick="addNodeAtCenter()" class="flex items-center gap-1 px-2.5 py-1.5 bg-amber-500/10 text-amber-400 rounded-lg text-[11px] font-mono hover:bg-amber-500/20 smooth-transition">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Node
      </button>
      <button data-theme-toggle onclick="toggleTheme()" class="text-zinc-400 hover:text-amber-400 p-1.5 rounded-lg hover:bg-zinc-800 smooth-transition" title="Toggle theme">
        <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div id="user-info" class="flex items-center gap-1.5 ml-1 pl-2 border-l border-zinc-700">
        <div class="w-6 h-6 rounded-full bg-amber-500 flex items-center justify-center text-[10px] font-bold text-black">D</div>
        <span class="font-mono text-[10px] text-zinc-400">Demo User</span>
        <span class="text-[9px] font-mono px-1.5 py-0.5 rounded bg-zinc-800 text-zinc-500 border border-zinc-700">OFFLINE</span>
      </div>
    </div>
  </header>

  <!-- Canvas -->
  <main id="canvas-container" class="flex-1 overflow-hidden relative">
    <svg id="canvas-svg" width="100%" height="100%">
      <defs>
        <marker id="arrow-default" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
          <polygon points="0 0,10 3,0 6" fill="#71717a"/>
        </marker>
        <marker id="arrow-accent" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
          <polygon points="0 0,10 3,0 6" fill="var(--accent)"/>
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
          <polygon points="0 0,10 3,0 6" fill="#ef4444"/>
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
          <polygon points="0 0,10 3,0 6" fill="#22c55e"/>
        </marker>
        <marker id="arrow-purple" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
          <polygon points="0 0,10 3,0 6" fill="#8b5cf6"/>
        </marker>
        <pattern id="grid-pattern" width="50" height="50" patternUnits="userSpaceOnUse">
          <circle cx="25" cy="25" r="1" class="canvas-grid-dot"/>
        </pattern>
      </defs>
      <rect id="grid-bg" width="20000" height="20000" x="-10000" y="-10000" fill="url(#grid-pattern)"/>
      <g id="groups-layer"></g>
      <g id="connections-layer"></g>
      <g id="nodes-layer"></g>
      <g id="drag-connection-layer"></g>
    </svg>
    <!-- Minimap -->
    <div id="minimap" class="absolute bottom-4 right-4 shadow-lg">
      <svg id="minimap-svg" viewBox="0 0 200 140"></svg>
    </div>
  </main>
</div>

<!-- ══════════════════════════════════════════════
     CONTEXT MENU

<!-- ══════════════════════════════════════════════
     JAVASCRIPT
     ══════════════════════════════════════════════ -->
<script>
// ==================== CONSTANTS ====================
const NODE_TYPES = {
  Function:    { color: '#3b82f6', icon: 'zap',            label: 'Function' },
  Requirement: { color: '#f59e0b', icon: 'file-text',      label: 'Requirement' },
  FailureMode: { color: '#ef4444', icon: 'alert-triangle', label: 'Failure Mode' },
  Component:   { color: '#22c55e', icon: 'box',            label: 'Component' },
  TestCase:    { color: '#8b5cf6', icon: 'check-circle',   label: 'Test Case' },
  Generic:     { color: '#71717a', icon: 'circle',         label: 'Generic' }
};
const CONN_TYPES = ['decomposes into', 'causes', 'verified by', 'mitigates'];
const CONN_ARROWS = { 'decomposes into': '#arrow-default', 'causes': '#arrow-red', 'verified by': '#arrow-purple', 'mitigates': '#arrow-green' };
const CONN_COLORS = { 'decomposes into': '#71717a', 'causes': '#ef4444', 'verified by': '#8b5cf6', 'mitigates': '#22c55e' };
const DEFAULT_NODE_W = 200;
const DEFAULT_NODE_H = 72;
const DB_PREFIX_BASE = 'demo_db_mindforge_';
let _currentProjectId = null; // Set by active-project postMessage
let _projects = []; // From projects-registry postMessage
let _firebaseInitialized = false;
let _firestoreDb = null;
let _currentUser = null;
let _firestoreUnsub = null;
let _firestoreSaveTimer = null;
let _lastFirestoreUpdate = 0;
let _firestoreLoaded = false;    // true once initial Firestore .get() resolves
let _editingNodeId = null;       // set while edit modal is open
let _pendingRemoteSync = null;   // stashed remote data during edit
let _savePaused = false;         // suppress onSnapshot echo during saves
const PRIORITIES = ['Low', 'Medium', 'High', 'Critical'];
const STATUSES = ['Active', 'Completed', 'Blocked', 'On Hold'];

function _initFirebase(config) {
  if (_firebaseInitialized || !config || !config.apiKey) return;
  try {
    firebase.initializeApp(config);
    _firestoreDb = firebase.firestore();
    _firebaseInitialized = true;
    console.log('[mindforge] Firebase initialized');
  } catch(e) { console.warn('[mindforge] Firebase init failed', e); }
}

function getDbPrefix() {
  return _currentProjectId ? DB_PREFIX_BASE + _currentProjectId + '_' : DB_PREFIX_BASE;
}

// ==================== STATE ====================
const params = new URLSearchParams(location.search);
const DEMO_MODE = params.get('demo') === 'true' || localStorage.getItem('mindforge_demo') === 'true';
if (DEMO_MODE) localStorage.setItem('mindforge_demo', 'true');

const state = {
  maps: [],
  activeMapId: null,
  theme: document.documentElement.getAttribute('data-theme') || 'dark',
  zoom: 1,
  panX: 0,
  panY: 0,
  selectedNodeId: null,
  draggingNodeId: null,
  dragStartX: 0, dragStartY: 0,
  nodeDragStartX: 0, nodeDragStartY: 0,
  isPanning: false,
  panStartX: 0, panStartY: 0,
  panStartPanX: 0, panStartPanY: 0,
  connectingFrom: null,
  connectingMouse: null,
  spaceDown: false,
  sidebarOpen: true
};

// ==================== HELPERS ====================
function uid() { return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 6); }
function getMap() { return state.maps.find(m => m.id === state.activeMapId) || null; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ==================== PERSISTENCE ====================
function saveAll() {
  const pfx = getDbPrefix();
  // Always save to localStorage as backup
  try {
    localStorage.setItem(pfx + 'maps', JSON.stringify(state.maps));
    localStorage.setItem(pfx + 'active', state.activeMapId || '');
  } catch(e) {}

  // Save to Firestore when available (debounced)
  if (_firestoreDb && _currentUser && _currentProjectId) {
    clearTimeout(_firestoreSaveTimer);
    _savePaused = true;
    const pid = _currentProjectId;
    _firestoreSaveTimer = setTimeout(() => {
      const data = {
        maps: JSON.parse(JSON.stringify(state.maps)),
        activeMapId: state.activeMapId || null,
        updatedAt: Date.now(),
      };
      _firestoreDb.collection('projects').doc(pid)
        .collection('mindforge').doc('state')
        .set(data, { merge: true })
        .then(() => console.log('[mindforge] Saved to Firestore for', pid))
        .catch(err => console.warn('[mindforge] Firestore save failed', err))
        .finally(() => { setTimeout(() => { _savePaused = false; }, 500); });
    }, 500);
  }
}

function _saveToProjectImmediate(pid, maps, activeMapId) {
  // Immediate save for project switches — captures data before state changes
  if (!_firestoreDb || !_currentUser || !pid) return;
  const data = {
    maps: JSON.parse(JSON.stringify(maps)),
    activeMapId: activeMapId || null,
    updatedAt: Date.now(),
  };
  _firestoreDb.collection('projects').doc(pid)
    .collection('mindforge').doc('state')
    .set(data, { merge: true })
    .then(() => console.log('[mindforge] Saved to Firestore for', pid))
    .catch(err => console.warn('[mindforge] Firestore save failed', err));
}

function loadAll() {
  const pfx = getDbPrefix();
  // Load from localStorage first (instant)
  const raw = localStorage.getItem(pfx + 'maps');
  if (raw) {
    try { state.maps = JSON.parse(raw); } catch(e) { state.maps = []; }
  } else {
    state.maps = [];
  }
  state.activeMapId = localStorage.getItem(pfx + 'active') || (state.maps[0]?.id || null);

  // Then load from Firestore if available (async, overrides localStorage)
  if (_firestoreDb && _currentUser && _currentProjectId) {
    _loadFromFirestore(_currentProjectId);
  } else {
    // No Firestore — seed demo data from localStorage context only
    if (!state.maps.length && _currentProjectId === 'demo_proj_000') seedDemoData();
  }
}

function _loadFromFirestore(projectId) {
  // Unsubscribe previous listener
  if (_firestoreUnsub) { _firestoreUnsub(); _firestoreUnsub = null; }

  const docRef = _firestoreDb.collection('projects').doc(projectId)
    .collection('mindforge').doc('state');

  // Initial load
  docRef.get().then(snap => {
    _firestoreLoaded = true;
    if (snap.exists) {
      const d = snap.data();
      state.maps = d.maps || [];
      state.activeMapId = d.activeMapId || (state.maps[0]?.id || null);
      _lastFirestoreUpdate = d.updatedAt || 0;
      // Persist Firestore data to localStorage so next load starts with fresh data
      const pfx = getDbPrefix();
      try {
        localStorage.setItem(pfx + 'maps', JSON.stringify(state.maps));
        localStorage.setItem(pfx + 'active', state.activeMapId || '');
      } catch(e) {}
      console.log('[mindforge] Loaded from Firestore:', state.maps.length, 'maps');
      // Debug: dump map structure
      state.maps.forEach(m => {
        const connSample = (m.connections || [])[0];
        console.log('[mindforge][debug] Map:', m.id, m.name,
          '| nodes:', (m.nodes||[]).length,
          '| connections:', (m.connections||[]).length,
          '| connFields:', connSample ? Object.keys(connSample).join(',') : 'none',
          '| sample:', connSample ? JSON.stringify(connSample) : 'none');
      });
    } else {
      console.log('[mindforge] No Firestore data for project', projectId);
      // Seed demo data only when Firestore confirms no data exists
      if (!state.maps.length && projectId === 'demo_proj_000') seedDemoData();
    }
    // After Firestore data is loaded, honour any hash-based deep link
    restoreFromHash();
    renderSidebar();
    renderCanvas();
  }).catch(err => {
    _firestoreLoaded = true;
    console.warn('[mindforge] Firestore load failed, using localStorage', err);
  });

  // Real-time listener for remote changes
  _firestoreUnsub = docRef.onSnapshot(snap => {
    if (!snap.exists) return;
    if (snap.metadata.hasPendingWrites) return;
    if (_savePaused) return; // suppress echo from our own save
    const d = snap.data();
    const remoteUpdatedAt = d.updatedAt || 0;
    if (remoteUpdatedAt > _lastFirestoreUpdate) {
      _lastFirestoreUpdate = remoteUpdatedAt;
      if (_editingNodeId) {
        // Stash remote data; apply when modal closes
        _pendingRemoteSync = d;
        console.log('[mindforge] Deferred remote sync (edit in progress)');
        return;
      }
      state.maps = d.maps || [];
      state.activeMapId = d.activeMapId || (state.maps[0]?.id || null);
      renderSidebar();
      renderCanvas();
      console.log('[mindforge] Synced from Firestore');
    }
  }, err => console.warn('[mindforge] onSnapshot error', err));
}

// Migrate legacy data (no project prefix) to Interceptor Drone project
function _migrateToProject() {
  const legacyMaps = localStorage.getItem(DB_PREFIX_BASE + 'maps');
  if (!legacyMaps) return; // Nothing to migrate
  const targetPfx = DB_PREFIX_BASE + 'demo_proj_000_';
  if (localStorage.getItem(targetPfx + 'maps')) return; // Already migrated
  localStorage.setItem(targetPfx + 'maps', legacyMaps);
  const legacyActive = localStorage.getItem(DB_PREFIX_BASE + 'active');
  if (legacyActive) localStorage.setItem(targetPfx + 'active', legacyActive);
  // Clean up legacy keys
  localStorage.removeItem(DB_PREFIX_BASE + 'maps');
  localStorage.removeItem(DB_PREFIX_BASE + 'active');
  console.log('[mindforge] Migrated legacy data to demo_proj_000');
}

// One-time cleanup: remove wrongly-seeded interceptor drone data from non-interceptor projects
function _cleanupWrongSeeds() {
  if (localStorage.getItem('mindforge_seed_cleanup_v1')) return;
  const demoIds = ['demo_sys_decomp', 'demo_fmea'];
  ['demo_proj_001', 'demo_proj_002'].forEach(pid => {
    const key = DB_PREFIX_BASE + pid + '_maps';
    const raw = localStorage.getItem(key);
    if (!raw) return;
    try {
      const maps = JSON.parse(raw);
      // If all maps are demo seed maps, clear them
      if (maps.length > 0 && maps.every(m => demoIds.includes(m.id))) {
        localStorage.removeItem(key);
        localStorage.removeItem(DB_PREFIX_BASE + pid + '_active');
        console.log('[mindforge] Cleaned wrongly-seeded data from', pid);
      }
    } catch(e) {}
  });
  localStorage.setItem('mindforge_seed_cleanup_v1', '1');
}

// ==================== THEME ====================
function updateThemeIcon(t) {
  const el = document.getElementById('theme-icon');
  if (el) el.innerHTML = t === 'dark'
    ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
}
document.addEventListener('bsi-theme-applied', e => {
  if (e.detail && e.detail.theme) { state.theme = e.detail.theme; updateThemeIcon(e.detail.theme); if (typeof renderCanvas === 'function') renderCanvas(); }
});
function toggleTheme() { if (window.bsiToggleTheme) window.bsiToggleTheme(); }

// ==================== DEMO MODE ====================
function exitDemo() {
  localStorage.removeItem('mindforge_demo');
  Object.keys(localStorage).forEach(k => { if (k.startsWith(DB_PREFIX_BASE)) localStorage.removeItem(k); });
  location.href = location.pathname;
}
function resetDemo() {
  Object.keys(localStorage).forEach(k => { if (k.startsWith(DB_PREFIX_BASE)) localStorage.removeItem(k); });
  location.reload();
}

// ==================== TOAST ====================
function toast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(10px)'; setTimeout(() => el.remove(), 300); }, 3000);
}

// ==================== CANVAS COORDINATE TRANSFORMS ====================
function screenToCanvas(sx, sy) {
  const svg = document.getElementById('canvas-svg');
  const rect = svg.getBoundingClientRect();
  return {
    x: (sx - rect.left) / state.zoom + state.panX,
    y: (sy - rect.top) / state.zoom + state.panY
  };
}
function canvasToScreen(cx, cy) {
  const svg = document.getElementById('canvas-svg');
  const rect = svg.getBoundingClientRect();
  return {
    x: (cx - state.panX) * state.zoom + rect.left,
    y: (cy - state.panY) * state.zoom + rect.top
  };
}

// ==================== ZOOM & PAN ====================
function updateViewBox() {
  const svg = document.getElementById('canvas-svg');
  const rect = svg.getBoundingClientRect();
  const w = rect.width / state.zoom;
  const h = rect.height / state.zoom;
  svg.setAttribute('viewBox', `${state.panX} ${state.panY} ${w} ${h}`);
  document.getElementById('zoom-slider').value = Math.round(state.zoom * 100);
  document.getElementById('zoom-label').textContent = Math.round(state.zoom * 100) + '%';
  renderMinimap();
}
function setZoom(z, anchorX, anchorY) {
  const oldZ = state.zoom;
  state.zoom = clamp(z, 0.15, 3);
  if (anchorX !== undefined) {
    state.panX += anchorX * (1/oldZ - 1/state.zoom);
    state.panY += anchorY * (1/oldZ - 1/state.zoom);
  }
  updateViewBox();
}
function zoomIn() { setZoom(state.zoom * 1.2); }
function zoomOut() { setZoom(state.zoom / 1.2); }
function fitToScreen() {
  const map = getMap();
  if (!map || !map.nodes.length) return;
  const svg = document.getElementById('canvas-svg');
  const rect = svg.getBoundingClientRect();
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  map.nodes.forEach(n => {
    minX = Math.min(minX, n.position.x);
    minY = Math.min(minY, n.position.y);
    maxX = Math.max(maxX, n.position.x + (n.size?.w || DEFAULT_NODE_W));
    maxY = Math.max(maxY, n.position.y + (n.size?.h || DEFAULT_NODE_H));
  });
  const pad = 80;
  const contentW = maxX - minX + pad * 2;
  const contentH = maxY - minY + pad * 2;
  state.zoom = clamp(Math.min(rect.width / contentW, rect.height / contentH), 0.15, 2);
  const viewW = rect.width / state.zoom;
  const viewH = rect.height / state.zoom;
  state.panX = (minX - pad) - (viewW - contentW) / 2;
  state.panY = (minY - pad) - (viewH - contentH) / 2;
  updateViewBox();
}

// ==================== NODE RENDERING ====================
function getNodeColor(node) {
  return node.color || NODE_TYPES[node.type]?.color || '#71717a';
}
function renderNodeSVG(node) {
  const w = node.size?.w || DEFAULT_NODE_W;
  const h = node.size?.h || DEFAULT_NODE_H;
  const color = getNodeColor(node);
  const typeInfo = NODE_TYPES[node.type] || NODE_TYPES.Generic;
  const isSelected = state.selectedNodeId === node.id;
  const isLinked = !!node.linkedApp;
  const priorityColor = node.priority === 'Critical' ? '#ef4444' : node.priority === 'High' ? '#f59e0b' : node.priority === 'Medium' ? '#3b82f6' : '#71717a';

  let html = `<g class="mind-node ${isSelected ? 'selected' : ''}" data-node-id="${node.id}" transform="translate(${node.position.x},${node.position.y})">`;
  // Shadow
  html += `<rect x="2" y="2" width="${w}" height="${h}" rx="8" fill="black" opacity="0.15"/>`;
  // Background
  html += `<rect class="node-bg" x="0" y="0" width="${w}" height="${h}" rx="8" fill="${color}" opacity="0.12" stroke="${isSelected ? 'var(--accent)' : color}" stroke-width="${isSelected ? 2.5 : 1.5}"/>`;
  // Left color bar
  html += `<rect x="0" y="0" width="4" height="${h}" rx="2" fill="${color}"/>`;
  // Content
  html += `<foreignObject x="0" y="0" width="${w}" height="${h}">
    <div xmlns="http://www.w3.org/1999/xhtml" class="node-content" style="padding:8px 10px 8px 14px;height:100%;display:flex;flex-direction:column;justify-content:center;">
      <div style="display:flex;align-items:center;gap:5px;">
        <span style="color:${color};font-size:10px;opacity:0.8;">${typeInfo.label}</span>
        ${node.priority ? `<span style="width:6px;height:6px;border-radius:50%;background:${priorityColor};display:inline-block;"></span>` : ''}
      </div>
      <div class="node-title" style="color:var(--text-primary);margin-top:2px;">${escHtml(node.title)}</div>
      ${node.owner ? `<div class="node-meta" style="color:var(--text-muted);">${escHtml(node.owner)}</div>` : ''}
    </div>
  </foreignObject>`;
  // Connectors
  const cx = w / 2, cy = h / 2;
  html += `<circle class="connector" cx="${cx}" cy="0" r="5" fill="var(--accent)" data-pos="top"/>`;
  html += `<circle class="connector" cx="${w}" cy="${cy}" r="5" fill="var(--accent)" data-pos="right"/>`;
  html += `<circle class="connector" cx="${cx}" cy="${h}" r="5" fill="var(--accent)" data-pos="bottom"/>`;
  html += `<circle class="connector" cx="0" cy="${cy}" r="5" fill="var(--accent)" data-pos="left"/>`;
  // Linked badge
  if (isLinked) {
    const appColor = node.linkedApp === 'scrum' ? '#3b82f6' : node.linkedApp === 'reqforge' ? '#f59e0b' : '#22c55e';
    html += `<circle class="node-badge" cx="${w - 2}" cy="2" r="8" fill="${appColor}" stroke="var(--bg-primary)" stroke-width="2"/>`;
    html += `<text x="${w - 2}" y="5" text-anchor="middle" font-size="8" fill="white" font-weight="bold" style="pointer-events:none;">↗</text>`;
  }
  html += '</g>';
  return html;
}
function escHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ==================== CONNECTION RENDERING ====================
function getConnectorPos(node, pos) {
  const w = node.size?.w || DEFAULT_NODE_W;
  const h = node.size?.h || DEFAULT_NODE_H;
  const x = node.position.x, y = node.position.y;
  switch(pos) {
    case 'top': return { x: x + w/2, y: y };
    case 'right': return { x: x + w, y: y + h/2 };
    case 'bottom': return { x: x + w/2, y: y + h };
    case 'left': return { x: x, y: y + h/2 };
    default: return { x: x + w/2, y: y + h/2 };
  }
}
function bestConnectors(from, to) {
  const fw = from.size?.w || DEFAULT_NODE_W, fh = from.size?.h || DEFAULT_NODE_H;
  const tw = to.size?.w || DEFAULT_NODE_W, th = to.size?.h || DEFAULT_NODE_H;
  const fcx = from.position.x + fw/2, fcy = from.position.y + fh/2;
  const tcx = to.position.x + tw/2, tcy = to.position.y + th/2;
  const dx = tcx - fcx, dy = tcy - fcy;
  let fromPos, toPos;
  if (Math.abs(dx) > Math.abs(dy)) {
    fromPos = dx > 0 ? 'right' : 'left';
    toPos = dx > 0 ? 'left' : 'right';
  } else {
    fromPos = dy > 0 ? 'bottom' : 'top';
    toPos = dy > 0 ? 'top' : 'bottom';
  }
  return { from: getConnectorPos(from, fromPos), to: getConnectorPos(to, toPos) };
}
function renderConnectionSVG(conn, map) {
  const fromNode = map.nodes.find(n => n.id === conn.fromNodeId);
  const toNode = map.nodes.find(n => n.id === conn.toNodeId);
  if (!fromNode || !toNode) {
    console.warn('[mindforge][debug] Connection', conn.id, 'missing node — fromNodeId:', conn.fromNodeId, 'toNodeId:', conn.toNodeId, '| raw keys:', Object.keys(conn).join(','));
    return '';
  }
  const pts = bestConnectors(fromNode, toNode);
  const dx = pts.to.x - pts.from.x, dy = pts.to.y - pts.from.y;
  const cx1 = pts.from.x + dx * 0.4, cy1 = pts.from.y;
  const cx2 = pts.to.x - dx * 0.4, cy2 = pts.to.y;
  const color = CONN_COLORS[conn.type] || '#71717a';
  const marker = CONN_ARROWS[conn.type] || '#arrow-default';
  const mx = (pts.from.x + pts.to.x) / 2, my = (pts.from.y + pts.to.y) / 2 - 8;
  let html = `<g class="connection-group" data-conn-id="${conn.id}">`;
  html += `<path class="connection-path" d="M${pts.from.x},${pts.from.y} C${cx1},${cy1} ${cx2},${cy2} ${pts.to.x},${pts.to.y}" stroke="${color}" marker-end="url(${marker})"/>`;
  html += `<text class="connection-label" x="${mx}" y="${my}" text-anchor="middle">${escHtml(conn.type)}</text>`;
  html += '</g>';
  return html;
}

// ==================== GROUP RENDERING ====================
function renderGroupSVG(group, map) {
  // Auto-calculate bounds from member nodes
  const members = map.nodes.filter(n => group.nodeIds.includes(n.id));
  if (!members.length) return '';
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  members.forEach(n => {
    minX = Math.min(minX, n.position.x);
    minY = Math.min(minY, n.position.y);
    maxX = Math.max(maxX, n.position.x + (n.size?.w || DEFAULT_NODE_W));
    maxY = Math.max(maxY, n.position.y + (n.size?.h || DEFAULT_NODE_H));
  });
  const pad = 30;
  const x = minX - pad, y = minY - pad - 18;
  const w = maxX - minX + pad * 2, h = maxY - minY + pad * 2 + 18;
  let html = `<g class="group" data-group-id="${group.id}">`;
  html += `<rect class="group-box" x="${x}" y="${y}" width="${w}" height="${h}" fill="${group.color}" fill-opacity="0.04" stroke="${group.color}" stroke-width="1.5" stroke-dasharray="6,3"/>`;
  html += `<text class="group-label" x="${x + 8}" y="${y + 14}" fill="${group.color}">${escHtml(group.title)}</text>`;
  html += '</g>';
  return html;
}

// ==================== MINIMAP ====================
function renderMinimap() {
  const map = getMap();
  const mmSvg = document.getElementById('minimap-svg');
  if (!map || !map.nodes.length) { mmSvg.innerHTML = ''; return; }
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  map.nodes.forEach(n => {
    minX = Math.min(minX, n.position.x);
    minY = Math.min(minY, n.position.y);
    maxX = Math.max(maxX, n.position.x + (n.size?.w || DEFAULT_NODE_W));
    maxY = Math.max(maxY, n.position.y + (n.size?.h || DEFAULT_NODE_H));
  });
  const pad = 40;
  const cw = maxX - minX + pad * 2 || 1;
  const ch = maxY - minY + pad * 2 || 1;
  mmSvg.setAttribute('viewBox', `${minX - pad} ${minY - pad} ${cw} ${ch}`);
  let html = '';
  // Connections
  (map.connections || []).forEach(c => {
    const from = map.nodes.find(n => n.id === c.fromNodeId);
    const to = map.nodes.find(n => n.id === c.toNodeId);
    if (from && to) {
      const fx = from.position.x + (from.size?.w || DEFAULT_NODE_W)/2;
      const fy = from.position.y + (from.size?.h || DEFAULT_NODE_H)/2;
      const tx = to.position.x + (to.size?.w || DEFAULT_NODE_W)/2;
      const ty = to.position.y + (to.size?.h || DEFAULT_NODE_H)/2;
      html += `<line x1="${fx}" y1="${fy}" x2="${tx}" y2="${ty}" stroke="#71717a" stroke-width="2" opacity="0.3"/>`;
    }
  });
  // Nodes
  map.nodes.forEach(n => {
    const color = getNodeColor(n);
    html += `<rect class="minimap-node" x="${n.position.x}" y="${n.position.y}" width="${n.size?.w || DEFAULT_NODE_W}" height="${n.size?.h || DEFAULT_NODE_H}" rx="3" fill="${color}" opacity="0.5"/>`;
  });
  // Viewport rect
  const svg = document.getElementById('canvas-svg');
  const rect = svg.getBoundingClientRect();
  const vw = rect.width / state.zoom, vh = rect.height / state.zoom;
  html += `<rect class="minimap-viewport" x="${state.panX}" y="${state.panY}" width="${vw}" height="${vh}" rx="2"/>`;
  mmSvg.innerHTML = html;
}

// ==================== LAYOUT ALGORITHMS ====================
function applyLayout(type) {
  const map = getMap();
  if (!map || !map.nodes.length) return;
  // Find root (node with most outgoing connections, or first node)
  const outCount = {};
  map.nodes.forEach(n => outCount[n.id] = 0);
  map.connections.forEach(c => { if (outCount[c.fromNodeId] !== undefined) outCount[c.fromNodeId]++; });
  let rootId = map.nodes[0].id;
  let maxOut = -1;
  Object.entries(outCount).forEach(([id, count]) => { if (count > maxOut) { maxOut = count; rootId = id; } });

  const positions = {};
  if (type === 'tree') layoutTree(map, rootId, positions);
  else if (type === 'radial') layoutRadial(map, rootId, positions);
  else if (type === 'force') layoutForce(map, positions);

  // Animate
  animateLayout(map, positions);
  // Highlight active layout button
  document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('bg-amber-500/20', 'text-amber-400'));
  const btn = document.querySelector(`.layout-btn[data-layout="${type}"]`);
  if (btn) { btn.classList.add('bg-amber-500/20', 'text-amber-400'); }
}

function layoutTree(map, rootId, positions) {
  const children = {};
  map.nodes.forEach(n => children[n.id] = []);
  map.connections.forEach(c => { if (children[c.fromNodeId]) children[c.fromNodeId].push(c.toNodeId); });
  const visited = new Set();
  const levels = {};
  function bfs(startId) {
    const q = [{ id: startId, level: 0 }];
    visited.add(startId);
    while (q.length) {
      const { id, level } = q.shift();
      if (!levels[level]) levels[level] = [];
      levels[level].push(id);
      (children[id] || []).forEach(cid => { if (!visited.has(cid)) { visited.add(cid); q.push({ id: cid, level: level + 1 }); } });
    }
  }
  bfs(rootId);
  // Add orphans
  map.nodes.forEach(n => { if (!visited.has(n.id)) { const lk = Object.keys(levels).length; if (!levels[lk]) levels[lk] = []; levels[lk].push(n.id); } });
  const hGap = 260, vGap = 140;
  Object.entries(levels).forEach(([lvl, ids]) => {
    const totalW = ids.length * hGap;
    ids.forEach((id, i) => {
      positions[id] = { x: i * hGap - totalW / 2 + hGap / 2, y: parseInt(lvl) * vGap };
    });
  });
}

function layoutRadial(map, rootId, positions) {
  const children = {};
  map.nodes.forEach(n => children[n.id] = []);
  map.connections.forEach(c => { if (children[c.fromNodeId]) children[c.fromNodeId].push(c.toNodeId); });
  const visited = new Set();
  const levels = {};
  function bfs(startId) {
    const q = [{ id: startId, level: 0 }];
    visited.add(startId);
    while (q.length) {
      const { id, level } = q.shift();
      if (!levels[level]) levels[level] = [];
      levels[level].push(id);
      (children[id] || []).forEach(cid => { if (!visited.has(cid)) { visited.add(cid); q.push({ id: cid, level: level + 1 }); } });
    }
  }
  bfs(rootId);
  map.nodes.forEach(n => { if (!visited.has(n.id)) { const lk = Object.keys(levels).length; if (!levels[lk]) levels[lk] = []; levels[lk].push(n.id); } });
  positions[rootId] = { x: 0, y: 0 };
  Object.entries(levels).forEach(([lvl, ids]) => {
    if (parseInt(lvl) === 0) return;
    const radius = parseInt(lvl) * 250;
    ids.forEach((id, i) => {
      const angle = (i / ids.length) * Math.PI * 2 - Math.PI / 2;
      positions[id] = { x: Math.cos(angle) * radius, y: Math.sin(angle) * radius };
    });
  });
}

function layoutForce(map, positions) {
  // Initialize positions randomly if needed
  map.nodes.forEach(n => {
    positions[n.id] = { x: n.position.x || (Math.random() - 0.5) * 800, y: n.position.y || (Math.random() - 0.5) * 600 };
  });
  const iterations = 60;
  const repulsion = 50000;
  const attraction = 0.005;
  const damping = 0.9;
  const vel = {};
  map.nodes.forEach(n => vel[n.id] = { x: 0, y: 0 });
  for (let iter = 0; iter < iterations; iter++) {
    // Repulsion between all pairs
    for (let i = 0; i < map.nodes.length; i++) {
      for (let j = i + 1; j < map.nodes.length; j++) {
        const a = map.nodes[i].id, b = map.nodes[j].id;
        let dx = positions[a].x - positions[b].x;
        let dy = positions[a].y - positions[b].y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        let force = repulsion / (dist * dist);
        let fx = (dx / dist) * force;
        let fy = (dy / dist) * force;
        vel[a].x += fx; vel[a].y += fy;
        vel[b].x -= fx; vel[b].y -= fy;
      }
    }
    // Attraction along connections
    map.connections.forEach(c => {
      if (!positions[c.fromNodeId] || !positions[c.toNodeId]) return;
      let dx = positions[c.toNodeId].x - positions[c.fromNodeId].x;
      let dy = positions[c.toNodeId].y - positions[c.fromNodeId].y;
      let fx = dx * attraction;
      let fy = dy * attraction;
      vel[c.fromNodeId].x += fx; vel[c.fromNodeId].y += fy;
      vel[c.toNodeId].x -= fx; vel[c.toNodeId].y -= fy;
    });
    // Apply velocity with damping
    map.nodes.forEach(n => {
      vel[n.id].x *= damping;
      vel[n.id].y *= damping;
      positions[n.id].x += vel[n.id].x;
      positions[n.id].y += vel[n.id].y;
    });
  }
}

function animateLayout(map, targetPositions) {
  const startPositions = {};
  map.nodes.forEach(n => startPositions[n.id] = { x: n.position.x, y: n.position.y });
  const duration = 600;
  const startTime = performance.now();
  function step(time) {
    const t = Math.min((time - startTime) / duration, 1);
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; // easeInOut
    map.nodes.forEach(n => {
      if (targetPositions[n.id]) {
        n.position.x = startPositions[n.id].x + (targetPositions[n.id].x - startPositions[n.id].x) * ease;
        n.position.y = startPositions[n.id].y + (targetPositions[n.id].y - startPositions[n.id].y) * ease;
      }
    });
    renderCanvas();
    if (t < 1) requestAnimationFrame(step);
    else { saveAll(); setTimeout(fitToScreen, 50); }
  }
  requestAnimationFrame(step);
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const map = JSON.parse(reader.result);
      if (!map.nodes) throw new Error('Invalid map');
      map.id = uid();
      state.maps.push(map);
      state.activeMapId = map.id;
      saveAll();
      renderSidebar();
      renderCanvas();
      toast('Map imported!', 'success');
    } catch(err) { toast('Invalid map file', 'error'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

  const map1 = {
    id: 'demo_sys_decomp', name: 'Interceptor Drone — System Decomposition',

// ==================== EVENT HANDLERS ====================
function setupEvents() {
  const container = document.getElementById('canvas-container');
  const svg = document.getElementById('canvas-svg');

  // Wheel zoom
  container.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = svg.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / state.zoom + state.panX;
    const my = (e.clientY - rect.top) / state.zoom + state.panY;
    const factor = e.deltaY < 0 ? 1.08 : 1 / 1.08;
    setZoom(state.zoom * factor, mx, my);
  }, { passive: false });

  // Mouse down on canvas
  svg.addEventListener('mousedown', e => {
    hideContextMenu();
    const pos = screenToCanvas(e.clientX, e.clientY);

    // Check if clicking on a connector
    if (e.target.classList.contains('connector')) {
      const nodeG = e.target.closest('.mind-node');
      if (nodeG) {
        state.connectingFrom = nodeG.dataset.nodeId;
        state.connectingMouse = pos;
        container.classList.add('connecting');
        e.preventDefault();
        return;
      }
    }

    // Check if clicking on a node
    const nodeG = e.target.closest('.mind-node');
    if (nodeG && e.button === 0) {
      const nodeId = nodeG.dataset.nodeId;
      state.selectedNodeId = nodeId;
      if (state.activeMapId && state.selectedNodeId) {
        history.replaceState(null, '', '#map/' + state.activeMapId + '/node/' + state.selectedNodeId);
      }
      state.draggingNodeId = nodeId;
      const map = getMap();
      const node = map?.nodes.find(n => n.id === nodeId);
      if (node) {
        state.dragStartX = e.clientX;
        state.dragStartY = e.clientY;
        state.nodeDragStartX = node.position.x;
        state.nodeDragStartY = node.position.y;
      }
      renderCanvas();
      e.preventDefault();
      return;
    }

    // Panning (middle click, or left click on empty space, or space+left)
    if (e.button === 1 || (e.button === 0 && !nodeG) || state.spaceDown) {
      state.isPanning = true;
      state.panStartX = e.clientX;
      state.panStartY = e.clientY;
      state.panStartPanX = state.panX;
      state.panStartPanY = state.panY;
      container.classList.add('panning');
      if (e.button === 0 && !nodeG) { state.selectedNodeId = null; if (state.activeMapId) history.replaceState(null, '', '#map/' + state.activeMapId); renderCanvas(); }
      e.preventDefault();
    }
  });

  // Mouse move
  window.addEventListener('mousemove', e => {
    // Dragging a node
    if (state.draggingNodeId) {
      const map = getMap();
      const node = map?.nodes.find(n => n.id === state.draggingNodeId);
      if (node) {
        node.position.x = state.nodeDragStartX + (e.clientX - state.dragStartX) / state.zoom;
        node.position.y = state.nodeDragStartY + (e.clientY - state.dragStartY) / state.zoom;
        renderCanvas();
      }
      return;
    }
    // Panning
    if (state.isPanning) {
      state.panX = state.panStartPanX - (e.clientX - state.panStartX) / state.zoom;
      state.panY = state.panStartPanY - (e.clientY - state.panStartY) / state.zoom;
      updateViewBox();
      return;
    }
    // Drawing connection
    if (state.connectingFrom) {
      state.connectingMouse = screenToCanvas(e.clientX, e.clientY);
      renderDragConnection();
    }
  });

  // Mouse up
  window.addEventListener('mouseup', e => {
    if (state.draggingNodeId) {
      state.draggingNodeId = null;
      saveAll();
    }
    if (state.isPanning) {
      state.isPanning = false;
      container.classList.remove('panning');
    }
    if (state.connectingFrom) {
      container.classList.remove('connecting');
      // Check if released on a node
      const nodeG = e.target.closest?.('.mind-node');
      if (nodeG && nodeG.dataset.nodeId !== state.connectingFrom) {
        addConnection(state.connectingFrom, nodeG.dataset.nodeId);
      }
      state.connectingFrom = null;
      state.connectingMouse = null;
      document.getElementById('drag-connection-layer').innerHTML = '';
    }
  });

  // Double click to edit
  svg.addEventListener('dblclick', e => {
    const nodeG = e.target.closest('.mind-node');
    if (nodeG) showEditModal(nodeG.dataset.nodeId);
  });

  // Right click context menu
  svg.addEventListener('contextmenu', e => {
    e.preventDefault();
    const nodeG = e.target.closest('.mind-node');
    if (nodeG) {
      state.selectedNodeId = nodeG.dataset.nodeId;
      if (state.activeMapId && state.selectedNodeId) {
        history.replaceState(null, '', '#map/' + state.activeMapId + '/node/' + state.selectedNodeId);
      }
      renderCanvas();
      showContextMenu(e.clientX, e.clientY);
    }
  });

  // Click outside context menu
  document.addEventListener('click', e => {
    if (!e.target.closest('#context-menu')) hideContextMenu();
  });

  // Keyboard
  window.addEventListener('keydown', e => {
    if (e.code === 'Space' && !e.target.closest('input,textarea,select')) { state.spaceDown = true; e.preventDefault(); }
    if (e.code === 'Delete' || e.code === 'Backspace') {
      if (!e.target.closest('input,textarea,select') && state.selectedNodeId) { deleteSelectedNode(); }
    }
    if (e.code === 'Escape') { state.selectedNodeId = null; hideContextMenu(); hideModal(); renderCanvas(); }
  });
  window.addEventListener('keyup', e => { if (e.code === 'Space') state.spaceDown = false; });

  // Badge click (linked nodes)
  svg.addEventListener('click', e => {
    if (e.target.classList.contains('node-badge') || e.target.closest('.node-badge')) {
      const nodeG = e.target.closest('.mind-node');
      if (nodeG) {
        const map = getMap();
        const node = map?.nodes.find(n => n.id === nodeG.dataset.nodeId);
        if (node?.linkedApp) {
          const urls = { scrum: 'https://scrum-app.pages.dev/?demo=true', reqforge: 'https://req-management.pages.dev/?demo=true', alm: 'https://alm-app.pages.dev/?demo=true' };
          window.open(urls[node.linkedApp] || '#', '_blank');
        }
      }
    }
  });
}

function renderDragConnection() {
  const map = getMap();
  if (!map || !state.connectingFrom || !state.connectingMouse) return;
  const fromNode = map.nodes.find(n => n.id === state.connectingFrom);
  if (!fromNode) return;
  const fx = fromNode.position.x + (fromNode.size?.w || DEFAULT_NODE_W) / 2;
  const fy = fromNode.position.y + (fromNode.size?.h || DEFAULT_NODE_H) / 2;
  const tx = state.connectingMouse.x, ty = state.connectingMouse.y;
  const dx = tx - fx;
  document.getElementById('drag-connection-layer').innerHTML =
    `<path d="M${fx},${fy} C${fx + dx*0.4},${fy} ${tx - dx*0.4},${ty} ${tx},${ty}" stroke="var(--accent)" stroke-width="2" stroke-dasharray="6,3" fill="none" opacity="0.6"/>`;
}

// ==================== SSO & PROJECT LISTENERS ====================
window.addEventListener('message', e => {
  const data = e.data;
  if (!data || typeof data !== 'object') return;

  // ── Active project switch ──
  if (data.type === 'active-project' && data.projectId) {
    const prevProject = _currentProjectId;
    if (prevProject !== data.projectId) {
      // Save current project data to Firestore BEFORE switching
      if (prevProject && state.maps.length) {
        // Save to localStorage with old prefix
        const oldPfx = DB_PREFIX_BASE + prevProject + '_';
        try {
          localStorage.setItem(oldPfx + 'maps', JSON.stringify(state.maps));
          localStorage.setItem(oldPfx + 'active', state.activeMapId || '');
        } catch(e) {}
        // Save to Firestore with captured old project ID
        _saveToProjectImmediate(prevProject, state.maps, state.activeMapId);
      }
      // Cancel any pending debounced save for the OLD project
      clearTimeout(_firestoreSaveTimer);
      _firestoreSaveTimer = null;
      _savePaused = false;
      _currentProjectId = data.projectId;
      try { localStorage.setItem('mindforge_active_project', data.projectId); } catch(e) {}
      // Unsubscribe old listener
      if (_firestoreUnsub) { _firestoreUnsub(); _firestoreUnsub = null; }
      // Clear state
      _firestoreLoaded = false;
      _pendingRemoteSync = null;
      state.maps = [];
      state.activeMapId = null;
      state.selectedNodeId = null;
      state.zoom = 1; state.panX = 0; state.panY = 0;
      // Load new project data
      loadAll();
      // NOTE: seedDemoData is now called inside _loadFromFirestore callback to avoid race condition
      if (!state.activeMapId && state.maps.length) state.activeMapId = state.maps[0].id;
      renderSidebar();
      renderCanvas();
      console.log('[mindforge] Switched to project:', data.projectId);
    }
    return;
  }

  // ── Projects registry ──
  if (data.type === 'projects-registry' && Array.isArray(data.projects)) {
    _projects = data.projects;
    return;
  }

  // ── SSO auth ──
  if (data.type === 'admin-auth') {
    const { firebaseConfig, sso, projects } = data;
    _initFirebase(firebaseConfig);
    if (sso) {
      _currentUser = {
        uid: sso.uid || sso.id,
        email: sso.email,
        name: sso.name || sso.displayName || sso.email,
        role: sso.role || 'viewer',
      };
      // Authenticate with Firebase and load Firestore data
      if (_firestoreDb) {
        const auth = firebase.auth();
        const _authTimeout = (p, ms) => Promise.race([p, new Promise((_, r) => setTimeout(() => r(new Error('timeout ' + ms + 'ms')), ms))]);
        (async () => {
          let firebaseAuthOk = false;
          try {
            // 0. Reuse existing session if already signed in with same UID
            if (auth.currentUser && auth.currentUser.uid === (sso.uid || sso.id)) {
              firebaseAuthOk = true;
              console.log('[mindforge] Reusing existing Firebase session');
            }
            // 1. Try Google OAuth ID token
            if (!firebaseAuthOk && sso.idToken) {
              try {
                const credential = firebase.auth.GoogleAuthProvider.credential(sso.idToken);
                await _authTimeout(auth.signInWithCredential(credential), 8000);
                firebaseAuthOk = true;
                console.log('[mindforge] Google credential auth OK');
              } catch (err) {
                console.warn('[mindforge] Google credential auth failed:', err.code || err.message);
              }
            }
            // 2. Fallback: custom token via Cloud Function
            if (!firebaseAuthOk && sso.firebaseIdToken) {
              try {
                const fn = firebase.functions().httpsCallable('mintCustomToken');
                const result = await _authTimeout(fn({ idToken: sso.firebaseIdToken }), 8000);
                await _authTimeout(auth.signInWithCustomToken(result.data.customToken), 8000);
                firebaseAuthOk = true;
                console.log('[mindforge] Custom token auth OK');
              } catch (err) {
                console.warn('[mindforge] Custom token auth failed:', err.code || err.message);
              }
            }
            // 3. Legacy: direct custom token
            if (!firebaseAuthOk && sso.customToken) {
              try {
                await _authTimeout(auth.signInWithCustomToken(sso.customToken), 8000);
                firebaseAuthOk = true;
                console.log('[mindforge] SSO sign-in OK');
              } catch (err) {
                console.warn('[mindforge] SSO sign-in failed:', err.code || err.message);
              }
            }
          } catch (e) {
            console.warn('[mindforge] Auth error:', e);
          }
          // Load from Firestore regardless — read-only may work with relaxed rules
          if (_currentProjectId) {
            _loadFromFirestore(_currentProjectId);
            if (firebaseAuthOk) console.log('[mindforge] Loading Firestore (authenticated)');
            else console.log('[mindforge] Loading Firestore (unauthenticated fallback)');
          }
        })();
      }
      const u = sso;
      document.getElementById('user-info').innerHTML = `
        ${u.photoURL ? `<img src="${u.photoURL}" style="width:24px;height:24px;border-radius:50%;border:1px solid rgba(245,158,11,0.5);" referrerpolicy="no-referrer">` : `<div class="w-6 h-6 rounded-full bg-amber-500 flex items-center justify-center text-[10px] font-bold text-black">${(u.displayName||u.email||'?')[0].toUpperCase()}</div>`}
        <span class="font-mono text-[10px] text-zinc-400">${u.displayName || u.email}</span>
      `;
    }
    if (Array.isArray(projects)) _projects = projects;
    console.log('[mindforge] admin-auth received', { user: _currentUser?.email, projects: _projects.length });
  }
  // Theme sync handled by BSI Theme Bridge v1.1 in <head>
});

// ==================== INIT ====================
function init() {
  updateThemeIcon(state.theme);
  if (DEMO_MODE) document.getElementById('demo-banner').classList.remove('hidden');
  // Adjust for demo banner
  if (DEMO_MODE) {
    document.getElementById('sidebar').style.paddingTop = '36px';
    document.getElementById('main').style.paddingTop = '36px';
  }
  // Migrate legacy non-project-scoped data to demo_proj_000
  _migrateToProject();
  _cleanupWrongSeeds();
  // Restore last active project
  try { _currentProjectId = localStorage.getItem('mindforge_active_project') || null; } catch(e) {}
  loadAll();
  // seedDemoData is called inside _loadFromFirestore callback to avoid racing with async Firestore load
  if (!state.activeMapId && state.maps.length) state.activeMapId = state.maps[0].id;
  setupEvents();
  renderSidebar();
  renderCanvas();
  setTimeout(fitToScreen, 200);
}

// ==================== HASH-BASED DEEP LINKING ====================
function restoreFromHash() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  const parts = hash.split('/');
  if (parts[0] === 'map' && parts[1]) {
    const mapExists = state.maps.some(m => m.id === parts[1]);
    if (!mapExists) return;
    state.activeMapId = parts[1];
    if (parts[2] === 'node' && parts[3]) {
      const map = getMap();
      if (map && map.nodes.some(n => n.id === parts[3])) {
        state.selectedNodeId = parts[3];
      }
    }
    renderSidebar();
    renderCanvas();
  }
}
window.addEventListener('hashchange', restoreFromHash);

init();
restoreFromHash();
</script>
